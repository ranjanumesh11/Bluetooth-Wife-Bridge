# =============================================================================
# Sven & Son Platinum — ESPHome GPIO Relay (Optocoupler) Bridge
# =============================================================================
# Approach 2: Hardware fallback. Each GPIO pin drives a PC817 optocoupler that
# shunts the corresponding button contact on the disassembled remote PCB.
# No BLE reverse-engineering required — this physically "presses" each button.
#
# REMOTE MODEL: Richmat HJH89 (FCC ID: 2AJJGHJC0)
# ALL 18 BUTTONS MAPPED:
#
#   GPIO  4  → Head Up
#   GPIO  5  → Head Down
#   GPIO 13  → Head Tilt Up      (small pillow tilt, up to 7°)
#   GPIO 14  → Head Tilt Down
#   GPIO 16  → Foot Up
#   GPIO 17  → Foot Down
#   GPIO 18  → Lumbar Up
#   GPIO 19  → Lumbar Down
#   GPIO 21  → Preset: Flat      (one-touch flat — center big button)
#   GPIO 22  → Preset: Zero-G
#   GPIO 23  → Preset: Anti-Snore
#   GPIO 25  → Memory Position   (save/recall stored position)
#   GPIO 26  → Massage ON/OFF    (master massage toggle)
#   GPIO 27  → Massage Mode      (cycle wave / pulse / combo)
#   GPIO 32  → Massage: Head zone
#   GPIO 33  → Massage: Foot zone
#   GPIO  2  → Under-Bed Light   (GPIO2 is safe as output after boot)
#   GPIO 15  → Flashlight        (GPIO15 is safe as output after boot)
#
# ⚠️  GPIO BOOT NOTES:
#   GPIO 2  — Strapping pin; LOW at boot (optocoupler inactive = safe). ✅
#   GPIO 12 — Avoid: affects flash voltage at boot.                     ❌
#   GPIO 15 — Strapping pin; must be HIGH at boot for normal operation,
#              but is freely usable as OUTPUT once booted. ✅ (add 10kΩ
#              pull-down if your board lacks one — most dev boards have it.)
#   GPIO 34–39 — Input-only on ESP32; cannot drive output.              ❌
#   GPIO 6–11  — Connected to internal flash; never use.                ❌
#
# WIRING (full schematic in hardware/schematic/SCHEMATIC.md):
#   ESP32 GPIO → 470Ω resistor → PC817 LED anode  (pin 1)
#   PC817 cathode (pin 2) → ESP32 GND
#   PC817 collector (pin 4) → remote button pad A
#   PC817 emitter   (pin 3) → remote button pad B (common/GND of remote)
#
# HOW TO USE:
#   1. Wire 18 optocoupler channels per hardware/schematic/SCHEMATIC.md
#   2. Copy this file into ESPHome config directory
#   3. Fill in secrets.yaml (see secrets.yaml.template)
#   4. Run: esphome run gpio_relay.yaml
# =============================================================================

substitutions:
  device_name: "sven-son-bed-gpio"
  friendly_name: "Sven & Son Bed GPIO Bridge"

  # Momentary press duration (ms).
  # 200 ms mimics a real button tap for position buttons.
  # Presets may need 500 ms if the bed controller requires a longer hold.
  press_duration: "200ms"

  # ── GPIO pin assignments — change to match your actual wiring ────────────
  pin_head_up:        "4"
  pin_head_down:      "5"
  pin_head_tilt_up:   "13"
  pin_head_tilt_down: "14"
  pin_foot_up:        "16"
  pin_foot_down:      "17"
  pin_lumbar_up:      "18"
  pin_lumbar_down:    "19"
  pin_preset_flat:    "21"
  pin_preset_zerog:   "22"
  pin_anti_snore:     "23"
  pin_memory:         "25"
  pin_massage_onoff:  "26"
  pin_massage_mode:   "27"
  pin_massage_head:   "32"
  pin_massage_foot:   "33"
  pin_lights:         "2"
  pin_flashlight:     "15"

# ---------------------------------------------------------------------------
# Core config
# ---------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "GPIO optocoupler relay bridge for Sven & Son Platinum (Richmat HJH89)"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.121    # ← Change to suit your network
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  power_save_mode: none
  reboot_timeout: 60s
  ap:
    ssid: "${device_name}-AP"
    password: !secret ap_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

logger:
  level: INFO

# ---------------------------------------------------------------------------
# SWITCH ENTITIES — all 18 remote buttons as GPIO momentary pulses
# GPIO goes HIGH for `press_duration` → optocoupler closes → button pressed.
# restore_mode: ALWAYS_OFF ensures no pin is HIGH on boot/power-cycle.
# ---------------------------------------------------------------------------
switch:

  # ════════════════════════════════════════════════════════════════════════
  # HEAD position  (main articulation, up to 75°)
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_head_up}, mode: OUTPUT, inverted: false }
    id: relay_head_up
    name: "Head Up"
    icon: mdi:arrow-up-bold-box
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_head_up

  - platform: gpio
    pin: { number: ${pin_head_down}, mode: OUTPUT }
    id: relay_head_down
    name: "Head Down"
    icon: mdi:arrow-down-bold-box
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_head_down

  # ════════════════════════════════════════════════════════════════════════
  # HEAD TILT  (small pillow tilt, up to 7° — top-row buttons on remote)
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_head_tilt_up}, mode: OUTPUT }
    id: relay_head_tilt_up
    name: "Head Tilt Up"
    icon: mdi:head-plus
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_head_tilt_up

  - platform: gpio
    pin: { number: ${pin_head_tilt_down}, mode: OUTPUT }
    id: relay_head_tilt_down
    name: "Head Tilt Down"
    icon: mdi:head-minus
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_head_tilt_down

  # ════════════════════════════════════════════════════════════════════════
  # FOOT position  (up to 45°)
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_foot_up}, mode: OUTPUT }
    id: relay_foot_up
    name: "Foot Up"
    icon: mdi:arrow-up-bold-box
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_foot_up

  - platform: gpio
    pin: { number: ${pin_foot_down}, mode: OUTPUT }
    id: relay_foot_down
    name: "Foot Down"
    icon: mdi:arrow-down-bold-box
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_foot_down

  # ════════════════════════════════════════════════════════════════════════
  # LUMBAR  (adjustable bar, up to 4")
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_lumbar_up}, mode: OUTPUT }
    id: relay_lumbar_up
    name: "Lumbar Up"
    icon: mdi:human
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_lumbar_up

  - platform: gpio
    pin: { number: ${pin_lumbar_down}, mode: OUTPUT }
    id: relay_lumbar_down
    name: "Lumbar Down"
    icon: mdi:human
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_lumbar_down

  # ════════════════════════════════════════════════════════════════════════
  # PRESETS
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_preset_flat}, mode: OUTPUT }
    id: relay_preset_flat
    name: "Preset: Flat"
    icon: mdi:bed-outline
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_preset_flat

  - platform: gpio
    pin: { number: ${pin_preset_zerog}, mode: OUTPUT }
    id: relay_preset_zerog
    name: "Preset: Zero-G"
    icon: mdi:alpha-z-circle
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_preset_zerog

  - platform: gpio
    pin: { number: ${pin_anti_snore}, mode: OUTPUT }
    id: relay_anti_snore
    name: "Preset: Anti-Snore"
    icon: mdi:sleep-off
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_anti_snore

  - platform: gpio
    pin: { number: ${pin_memory}, mode: OUTPUT }
    id: relay_memory
    name: "Memory Position"
    icon: mdi:content-save-outline
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_memory

  # ════════════════════════════════════════════════════════════════════════
  # MASSAGE  (3 modes: wave / pulse / combo)
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_massage_onoff}, mode: OUTPUT }
    id: relay_massage_onoff
    name: "Massage ON/OFF"
    icon: mdi:power
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_massage_onoff

  - platform: gpio
    pin: { number: ${pin_massage_mode}, mode: OUTPUT }
    id: relay_massage_mode
    name: "Massage Mode"
    icon: mdi:swap-horizontal-circle-outline
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_massage_mode

  - platform: gpio
    pin: { number: ${pin_massage_head}, mode: OUTPUT }
    id: relay_massage_head
    name: "Massage: Head"
    icon: mdi:vibrate
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_massage_head

  - platform: gpio
    pin: { number: ${pin_massage_foot}, mode: OUTPUT }
    id: relay_massage_foot
    name: "Massage: Foot"
    icon: mdi:vibrate
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_massage_foot

  # ════════════════════════════════════════════════════════════════════════
  # ACCESSORIES
  # ════════════════════════════════════════════════════════════════════════
  - platform: gpio
    pin: { number: ${pin_lights}, mode: OUTPUT }
    id: relay_lights
    name: "Under-Bed Light Toggle"
    icon: mdi:lightbulb-outline
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_lights

  - platform: gpio
    pin: { number: ${pin_flashlight}, mode: OUTPUT }
    id: relay_flashlight
    name: "Flashlight"
    icon: mdi:flashlight
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${press_duration}
      - switch.turn_off: relay_flashlight

# ---------------------------------------------------------------------------
# Diagnostic sensors
# ---------------------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "Bridge Wi-Fi Signal"
    update_interval: 60s
    unit_of_measurement: dBm

  - platform: uptime
    name: "Bridge Uptime"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Bridge Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Bridge IP Address"
    ssid:
      name: "Bridge SSID"
    mac_address:
      name: "Bridge MAC"
