# =============================================================================
# Sven & Son Platinum — ESPHome BLE Proxy + Active BLE Controller
# =============================================================================
# Approach 1: Software-only. The ESP32 acts as both a passive Bluetooth proxy
# (so HA's Bluetooth integration can see the bed) AND as an active BLE client
# that sends write commands to the bed's GATT characteristics.
#
# REMOTE MODEL: Richmat HJH89 (FCC ID: 2AJJGHJC0)
# BUTTONS COVERED (all 18 physical buttons on the real remote):
#   Row 1 : Zero-G (ZG), Flashlight, Anti-Snore
#   Row 2 : Head Tilt Up, Lumbar Up, Memory
#   Row 3 : Head Tilt Down, Lumbar Down, Under-Bed Light
#   Center: Head Up / FLAT / Foot Up
#   Row 5 : Head Down / (none) / Foot Down
#   Row 6 : Massage Head, Massage Mode, Massage Foot
#   Row 7 : (none) / Massage ON/OFF / (none)
#
# HOW TO USE:
#   1. Copy this file to your ESPHome config directory.
#   2. Create esphome/secrets.yaml with the keys referenced below.
#   3. Update 'bed_mac_address' and UUIDs after BLE scanning
#      (see docs/BLE_SCANNING.md).
#   4. Run: esphome run bluetooth_proxy.yaml
#
# NOTE: All cmd_* values below are PLACEHOLDER bytes.
#       Capture real values with nRF Connect or scripts/ble_scanner.py
#       while pressing each button on the physical remote.
# =============================================================================

# ---------------------------------------------------------------------------
# Substitutions — edit these without touching the rest of the config
# ---------------------------------------------------------------------------
substitutions:
  device_name: "sven-son-bed-bridge"
  friendly_name: "Sven & Son Bed Bridge"

  # ── BLE target ──────────────────────────────────────────────────────────
  # Replace with your bed's actual MAC address (from BLE scan).
  # Format: AA:BB:CC:DD:EE:FF  (colon-separated, upper-case)
  bed_mac_address: "AA:BB:CC:DD:EE:FF"

  # ── GATT Service & Characteristic UUIDs ─────────────────────────────────
  # Placeholder — discover with docs/BLE_SCANNING.md
  # FFE0/FFE1 is the most common pattern for Richmat/adjustable-bed remotes.
  service_uuid:    "0000ffe0-0000-1000-8000-00805f9b34fb"
  char_uuid_cmd:   "0000ffe1-0000-1000-8000-00805f9b34fb"

  # ── Command payloads (hex byte strings — PLACEHOLDERS) ───────────────────
  # Format: continuous hex, e.g. "AA0101FF" = bytes [0xAA, 0x01, 0x01, 0xFF]
  # Sniff real values with nRF Connect or Wireshark HCI snoop log.
  #
  # ── Position controls ──────────────────────────────────────────────────
  cmd_head_up:       "AA0101FF"   # HEAD ▲
  cmd_head_down:     "AA0102FF"   # HEAD ▼
  cmd_foot_up:       "AA0201FF"   # FOOT ▲
  cmd_foot_down:     "AA0202FF"   # FOOT ▼
  cmd_head_tilt_up:  "AA0301FF"   # HEAD TILT ▲  (small pillow tilt, up to 7°)
  cmd_head_tilt_dn:  "AA0302FF"   # HEAD TILT ▼
  cmd_lumbar_up:     "AA0401FF"   # LUMBAR ▲  (up to 4")
  cmd_lumbar_down:   "AA0402FF"   # LUMBAR ▼
  #
  # ── Presets ────────────────────────────────────────────────────────────
  cmd_flat:          "AA0501FF"   # FLAT  (center big button — one-touch flat)
  cmd_zero_g:        "AA0502FF"   # ZG  (Zero-Gravity preset)
  cmd_anti_snore:    "AA0503FF"   # ANTI-SNORE preset
  cmd_memory:        "AA0504FF"   # MEMORY  (save / recall stored position)
  #
  # ── Massage ────────────────────────────────────────────────────────────
  cmd_massage_on_off: "AA0601FF"  # Massage ON/OFF  (master toggle)
  cmd_massage_mode:   "AA0602FF"  # Massage MODE  (cycle wave / pulse / combo)
  cmd_massage_head:   "AA0603FF"  # Head massage intensity +
  cmd_massage_foot:   "AA0604FF"  # Foot massage intensity +
  #
  # ── Accessories ────────────────────────────────────────────────────────
  cmd_lights:         "AA0701FF"  # Under-bed light toggle
  cmd_flashlight:     "AA0702FF"  # Flashlight (built-in remote torch)

# ---------------------------------------------------------------------------
# Core ESPHome config
# ---------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Wi-Fi BLE bridge for Sven & Son Platinum adjustable base (Richmat HJH89)"

esp32:
  board: esp32dev        # Generic ESP-WROOM-32 38-pin dev board
  framework:
    type: arduino        # Arduino framework for broadest BLE library support

# ---------------------------------------------------------------------------
# Wi-Fi — credentials in secrets.yaml (never commit that file)
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP recommended — avoids DHCP latency on each reconnect
  manual_ip:
    static_ip: 192.168.1.120    # ← Change to suit your network
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  power_save_mode: none          # Disable Wi-Fi power save for lowest latency
  reboot_timeout: 60s
  ap:
    ssid: "${device_name}-AP"
    password: !secret ap_fallback_password

captive_portal:

# ---------------------------------------------------------------------------
# Core services
# ---------------------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  # Optional raw-command service — lets HA scripts send arbitrary BLE bytes
  services:
    - service: send_ble_command
      variables:
        command_hex: string
      then:
        - ble_client.ble_write:
            id: bed_client
            service_uuid: ${service_uuid}
            characteristic_uuid: ${char_uuid_cmd}
            value: !lambda |-
              std::vector<uint8_t> bytes;
              std::string hex = command_hex;
              for (size_t i = 0; i + 1 < hex.size(); i += 2)
                bytes.push_back((uint8_t)strtol(hex.substr(i, 2).c_str(), nullptr, 16));
              return bytes;

ota:
  password: !secret ota_password

logger:
  level: INFO
  # Use DEBUG during initial UUID discovery, then switch back to INFO

# ---------------------------------------------------------------------------
# Bluetooth — Passive proxy + active BLE client
# ---------------------------------------------------------------------------
bluetooth_proxy:
  active: true    # Lets HA initiate BLE connections through this device

esp32_ble_tracker:
  scan_parameters:
    interval: 200ms
    window: 100ms
    active: true

# Persistent BLE connection to the bed motor controller
ble_client:
  - mac_address: ${bed_mac_address}
    id: bed_client
    on_connect:
      then:
        - logger.log: "✅ Connected to Sven & Son bed controller"
    on_disconnect:
      then:
        - logger.log: "⚠️  Disconnected from bed — will auto-reconnect"

# ---------------------------------------------------------------------------
# Helper macro — write a BLE command then auto-clear the switch after 100 ms
# Used for all momentary buttons (position, presets, accessories)
# ---------------------------------------------------------------------------
# NOTE: ESPHome does not support YAML anchors natively in all versions.
# Each switch block is written out explicitly for maximum compatibility.

# ---------------------------------------------------------------------------
# SWITCH ENTITIES — all 18 remote buttons
# ---------------------------------------------------------------------------
switch:

  # ════════════════════════════════════════════════════════════════════════
  # HEAD position  (main articulation, up to 75°)
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Head Up"
    id: sw_head_up
    icon: mdi:arrow-up-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x01, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_up
    turn_off_action: []

  - platform: template
    name: "Head Down"
    id: sw_head_down
    icon: mdi:arrow-down-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x01, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_down
    turn_off_action: []

  # ════════════════════════════════════════════════════════════════════════
  # HEAD TILT  (small pillow tilt, up to 7° — separate from main head)
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Head Tilt Up"
    id: sw_head_tilt_up
    icon: mdi:head-plus
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x03, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_tilt_up
    turn_off_action: []

  - platform: template
    name: "Head Tilt Down"
    id: sw_head_tilt_down
    icon: mdi:head-minus
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x03, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_tilt_down
    turn_off_action: []

  # ════════════════════════════════════════════════════════════════════════
  # FOOT position  (up to 45°)
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Foot Up"
    id: sw_foot_up
    icon: mdi:arrow-up-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x02, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_foot_up
    turn_off_action: []

  - platform: template
    name: "Foot Down"
    id: sw_foot_down
    icon: mdi:arrow-down-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x02, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_foot_down
    turn_off_action: []

  # ════════════════════════════════════════════════════════════════════════
  # LUMBAR  (adjustable bar up to 4")
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Lumbar Up"
    id: sw_lumbar_up
    icon: mdi:human
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x04, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_lumbar_up
    turn_off_action: []

  - platform: template
    name: "Lumbar Down"
    id: sw_lumbar_down
    icon: mdi:human
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x04, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_lumbar_down
    turn_off_action: []

  # ════════════════════════════════════════════════════════════════════════
  # PRESETS
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Preset: Flat"
    id: sw_preset_flat
    icon: mdi:bed-outline
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_flat
    turn_off_action: []

  - platform: template
    name: "Preset: Zero-G"
    id: sw_preset_zerog
    icon: mdi:alpha-z-circle
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_zerog
    turn_off_action: []

  - platform: template
    name: "Preset: Anti-Snore"
    id: sw_preset_anti_snore
    icon: mdi:sleep-off
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x03, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_anti_snore
    turn_off_action: []

  - platform: template
    name: "Memory Position"
    id: sw_memory
    icon: mdi:content-save-outline
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x04, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_memory
    turn_off_action: []

  # ════════════════════════════════════════════════════════════════════════
  # MASSAGE  (3 modes: wave / pulse / combo)
  # The bed has independent head and foot massage zones.
  # ════════════════════════════════════════════════════════════════════════

  # Master on/off for all massage
  - platform: template
    name: "Massage ON/OFF"
    id: sw_massage_onoff
    icon: mdi:power
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x01, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x00, 0xFF]

  # Cycle through massage modes (wave → pulse → combo)
  - platform: template
    name: "Massage Mode"
    id: sw_massage_mode
    icon: mdi:swap-horizontal-circle-outline
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_massage_mode
    turn_off_action: []

  # Head zone massage
  - platform: template
    name: "Massage: Head"
    id: sw_massage_head
    icon: mdi:vibrate
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x03, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x00, 0xFF]

  # Foot zone massage
  - platform: template
    name: "Massage: Foot"
    id: sw_massage_foot
    icon: mdi:vibrate
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x04, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x00, 0xFF]

  # ════════════════════════════════════════════════════════════════════════
  # ACCESSORIES
  # ════════════════════════════════════════════════════════════════════════
  - platform: template
    name: "Under-Bed Light"
    id: sw_underbed_light
    icon: mdi:lightbulb-outline
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x07, 0x01, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x07, 0x00, 0xFF]

  - platform: template
    name: "Flashlight"
    id: sw_flashlight
    icon: mdi:flashlight
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x07, 0x02, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x07, 0x00, 0xFF]

# ---------------------------------------------------------------------------
# Diagnostic sensors
# ---------------------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "Bridge Wi-Fi Signal"
    update_interval: 60s
    unit_of_measurement: dBm
    icon: mdi:wifi

  - platform: uptime
    name: "Bridge Uptime"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Bridge Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Bridge IP Address"
    ssid:
      name: "Bridge SSID"
    mac_address:
      name: "Bridge MAC"
