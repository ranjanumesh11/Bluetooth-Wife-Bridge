# =============================================================================
# Sven & Son Platinum — ESPHome BLE Proxy + Active BLE Controller
# =============================================================================
# Approach 1: Software-only. The ESP32 acts as both a passive Bluetooth proxy
# (so HA's Bluetooth integration can see the bed) AND as an active BLE client
# that sends write commands to the bed's GATT characteristics.
#
# HOW TO USE:
#   1. Copy this file to your ESPHome config directory.
#   2. Create esphome/secrets.yaml with the keys referenced below.
#   3. Update the 'mac_address' and characteristic UUIDs after scanning
#      (see docs/BLE_SCANNING.md).
#   4. Run: esphome run bluetooth_proxy.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Substitutions — change these without touching the rest of the config
# ---------------------------------------------------------------------------
substitutions:
  device_name: "sven-son-bed-bridge"
  friendly_name: "Sven & Son Bed Bridge"

  # ── BLE target ──────────────────────────────────────────────────────────
  # Replace with your bed's actual MAC address (from BLE scan).
  # Format: AA:BB:CC:DD:EE:FF (colon-separated, upper-case)
  bed_mac_address: "AA:BB:CC:DD:EE:FF"

  # ── GATT Service & Characteristic UUIDs ─────────────────────────────────
  # These are placeholders. Run scripts/ble_scanner.py while pressing remote
  # buttons to capture the real UUIDs and command bytes.
  # Common pattern for adjustable bed remotes: a single "command" characteristic
  # under a proprietary 128-bit service UUID.
  service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
  char_uuid_cmd: "0000ffe1-0000-1000-8000-00805f9b34fb"

  # ── Command payloads (hex strings) ───────────────────────────────────────
  # Capture these by sniffing BLE traffic while pressing the physical remote.
  # Use nRF Connect (mobile) or Wireshark + BTLE HCI snoop log.
  cmd_head_up:    "AA0101FF"
  cmd_head_down:  "AA0102FF"
  cmd_foot_up:    "AA0201FF"
  cmd_foot_down:  "AA0202FF"
  cmd_lumbar_up:  "AA0301FF"
  cmd_lumbar_down:"AA0302FF"
  cmd_flat:       "AA0401FF"   # Preset: Flat / Zero-G
  cmd_zero_g:     "AA0402FF"   # Preset: Zero-G
  cmd_tv:         "AA0403FF"   # Preset: TV / Lounge
  cmd_massage_h:  "AA0501FF"   # Head massage toggle
  cmd_massage_f:  "AA0502FF"   # Foot massage toggle
  cmd_lights:     "AA0601FF"   # Under-bed light toggle

# ---------------------------------------------------------------------------
# Core ESPHome config
# ---------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Wi-Fi BLE bridge for Sven & Son Platinum adjustable base"

esp32:
  board: esp32dev        # Works for generic ESP-WROOM-32 38-pin boards
  framework:
    type: arduino        # arduino framework for broadest BLE compatibility

# ---------------------------------------------------------------------------
# Wi-Fi — credentials in secrets.yaml (never commit that file)
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP recommended for low-latency HA communication
  manual_ip:
    static_ip: 192.168.1.120    # Change to suit your network
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1

  # Fast reconnect settings
  power_save_mode: none          # Disable Wi-Fi power save for low latency
  reboot_timeout: 60s            # Reboot if no connection for 60 s

  ap:
    ssid: "${device_name}-AP"
    password: !secret ap_fallback_password

captive_portal:

# ---------------------------------------------------------------------------
# Core services
# ---------------------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  # Expose services for direct HA script calls
  services:
    - service: send_ble_command
      variables:
        command_hex: string
      then:
        - ble_client.ble_write:
            id: bed_client
            service_uuid: ${service_uuid}
            characteristic_uuid: ${char_uuid_cmd}
            value: !lambda |-
              // Convert hex string to bytes vector
              std::vector<uint8_t> bytes;
              std::string hex = command_hex;
              for (size_t i = 0; i + 1 < hex.size(); i += 2) {
                bytes.push_back((uint8_t)strtol(hex.substr(i, 2).c_str(), nullptr, 16));
              }
              return bytes;

ota:
  password: !secret ota_password

logger:
  level: INFO
  # Set to DEBUG during initial setup / UUID discovery, then drop to INFO

# ---------------------------------------------------------------------------
# Bluetooth — Proxy + Active Client
# ---------------------------------------------------------------------------
bluetooth_proxy:
  active: true    # Allow HA to initiate BLE connections through this proxy

esp32_ble_tracker:
  scan_parameters:
    interval: 200ms
    window: 100ms
    active: true

# Active BLE client — maintains a persistent connection to the bed controller
ble_client:
  - mac_address: ${bed_mac_address}
    id: bed_client
    on_connect:
      then:
        - logger.log: "Connected to Sven & Son bed controller"
    on_disconnect:
      then:
        - logger.log: "Disconnected from bed controller — will auto-reconnect"

# ---------------------------------------------------------------------------
# Switches — each press sends a momentary BLE command (100 ms hold)
# Maps to Home Assistant switch entities
# ---------------------------------------------------------------------------
switch:
  # ── Head ────────────────────────────────────────────────────────────────
  - platform: template
    name: "Head Up"
    id: sw_head_up
    icon: mdi:arrow-up-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x01, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_up
    turn_off_action: []

  - platform: template
    name: "Head Down"
    id: sw_head_down
    icon: mdi:arrow-down-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x01, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_head_down
    turn_off_action: []

  # ── Foot ────────────────────────────────────────────────────────────────
  - platform: template
    name: "Foot Up"
    id: sw_foot_up
    icon: mdi:arrow-up-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x02, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_foot_up
    turn_off_action: []

  - platform: template
    name: "Foot Down"
    id: sw_foot_down
    icon: mdi:arrow-down-bold-box
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x02, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_foot_down
    turn_off_action: []

  # ── Lumbar ──────────────────────────────────────────────────────────────
  - platform: template
    name: "Lumbar Up"
    id: sw_lumbar_up
    icon: mdi:human
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x03, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_lumbar_up
    turn_off_action: []

  - platform: template
    name: "Lumbar Down"
    id: sw_lumbar_down
    icon: mdi:human
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x03, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_lumbar_down
    turn_off_action: []

  # ── Presets ─────────────────────────────────────────────────────────────
  - platform: template
    name: "Preset: Flat"
    id: sw_preset_flat
    icon: mdi:bed-outline
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x04, 0x01, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_flat
    turn_off_action: []

  - platform: template
    name: "Preset: Zero-G"
    id: sw_preset_zerog
    icon: mdi:alpha-z-circle
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x04, 0x02, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_zerog
    turn_off_action: []

  - platform: template
    name: "Preset: TV/Lounge"
    id: sw_preset_tv
    icon: mdi:television-play
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x04, 0x03, 0xFF]
      - delay: 100ms
      - switch.turn_off: sw_preset_tv
    turn_off_action: []

  # ── Massage ─────────────────────────────────────────────────────────────
  - platform: template
    name: "Massage: Head"
    id: sw_massage_head
    icon: mdi:vibrate
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x01, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x00, 0xFF]

  - platform: template
    name: "Massage: Foot"
    id: sw_massage_foot
    icon: mdi:vibrate
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x02, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x05, 0x00, 0xFF]

  # ── Under-bed Lighting ──────────────────────────────────────────────────
  - platform: template
    name: "Under-Bed Light"
    id: sw_underbed_light
    icon: mdi:lightbulb-outline
    optimistic: true
    turn_on_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x01, 0xFF]
    turn_off_action:
      - ble_client.ble_write:
          id: bed_client
          service_uuid: ${service_uuid}
          characteristic_uuid: ${char_uuid_cmd}
          value: [0xAA, 0x06, 0x00, 0xFF]

# ---------------------------------------------------------------------------
# Diagnostic sensors — useful for monitoring bridge health in HA
# ---------------------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "Bridge Wi-Fi Signal"
    update_interval: 60s
    unit_of_measurement: dBm
    icon: mdi:wifi

  - platform: uptime
    name: "Bridge Uptime"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Bridge Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Bridge IP Address"
    ssid:
      name: "Bridge SSID"
    mac_address:
      name: "Bridge MAC"
