# =============================================================================
# Sven & Son Bed Bridge — FIRST FLASH CONFIG
# =============================================================================
# PURPOSE: Flash this to your ESP32 the very first time via USB cable.
#          It does NOTHING with the bed yet. It just gets the ESP32 onto your
#          home WiFi network so Home Assistant can see and adopt it.
#          Once adopted, you update it wirelessly (OTA) with the full config.
#
# HOW TO FLASH THIS (one-time USB process):
#   1. Open Microsoft Edge (or Chrome) on your laptop
#   2. Go to: https://web.esphome.io
#   3. Plug your ESP32 into your laptop via micro-USB cable
#   4. Click "Connect" → select the COM port (e.g., "Silicon Labs CP210x" or "CH340")
#      → If no COM port appears, see the driver note at the bottom of this file.
#   5. Click "Install" → "Custom firmware from file" OR use "Prepare for first use"
#      (Prepare for first use is the easiest — it creates a minimal WiFi config)
#
# AFTER FIRST FLASH:
#   - ESP32 will broadcast a WiFi hotspot named "sven-son-bed-bridge"
#   - Connect your phone/laptop to that hotspot
#   - A captive portal page opens automatically — enter your home WiFi name & password
#   - ESP32 reboots and joins your home network
#   - In HA Green: Settings → Devices & Services → a new ESPHome device appears
#   - Accept / Add it — you're done with USB forever
#
# USB DRIVER NOTE (if no COM port appears in Edge):
#   HiLetgo ESP-WROOM-32 boards use the CH340 chip.
#   Download driver: https://www.wch-ic.com/downloads/CH341SER_EXE.html
#   Install, unplug/replug ESP32, try again.
# =============================================================================

esphome:
  name: sven-son-bed-bridge
  friendly_name: "Sven & Son Bed Bridge"
  # Platform: ESP32 (your ESP-WROOM-32D chip)
  platform: ESP32
  board: esp32dev

# ---------------------------------------------------------------------------
# WiFi — connects to your home network
# If the ESP32 can't connect, it falls back to a hotspot (captive portal)
# so you can enter your WiFi credentials without reflashing.
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid          # Put your WiFi name in secrets.yaml
  password: !secret wifi_password  # Put your WiFi password in secrets.yaml

  # Fallback hotspot — if WiFi fails, ESP32 creates its own network
  # Connect to "sven-son-bed-bridge Fallback Hotspot" to reconfigure
  ap:
    ssid: "sven-son-bed-bridge"
    password: "BedBridge123"

# Captive portal for the fallback hotspot — shows a web page to enter WiFi creds
captive_portal:

# ---------------------------------------------------------------------------
# Home Assistant API — allows HA to talk to this device
# ---------------------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key   # Random 32-byte key — see secrets.yaml

# ---------------------------------------------------------------------------
# OTA (Over The Air) updates — allows HA / ESPHome to update firmware wirelessly
# After first USB flash, all future updates use this. No USB ever again.
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

# ---------------------------------------------------------------------------
# Logging — shows debug output in ESPHome log viewer
# ---------------------------------------------------------------------------
logger:
  level: DEBUG

# ---------------------------------------------------------------------------
# Bluetooth Proxy — lets HA's Bluetooth integration see nearby BLE devices
# INCLUDING your bed. We'll use this in the next step to find the bed's
# MAC address and BLE characteristics.
# ---------------------------------------------------------------------------
bluetooth_proxy:
  active: true   # Active = can connect to BLE devices (needed for bed control)

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 1100ms
    window: 1100ms

# ---------------------------------------------------------------------------
# Status LED — the built-in blue LED on the ESP32 dev board blinks to show status
# Solid = connected, Slow blink = no WiFi, Fast blink = no HA connection
# ---------------------------------------------------------------------------
status_led:
  pin:
    number: GPIO2
    inverted: false

# ---------------------------------------------------------------------------
# Diagnostic sensors — appear in HA so you can see the ESP32 is alive
# ---------------------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

binary_sensor:
  - platform: status
    name: "Bridge Status"

# =============================================================================
# secrets.yaml — CREATE THIS FILE in the same folder as this YAML
# (esphome/first-flash/secrets.yaml)
# DO NOT commit secrets.yaml to GitHub — it's in .gitignore
#
# Copy the template below and fill in your values:
#
# wifi_ssid: "YourHomeWiFiName"
# wifi_password: "YourHomeWiFiPassword"
# api_encryption_key: "generate one at: https://esphome.io/components/api.html#configuration-variables"
# ota_password: "choose-any-password-you-like"
#
# To generate an API encryption key:
#   Run in browser console: btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(32))))
#   Or just use a random 32+ char string — HA will tell you if it's wrong format
# =============================================================================
