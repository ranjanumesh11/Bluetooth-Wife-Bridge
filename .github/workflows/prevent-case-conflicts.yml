name: Prevent Case-Sensitive Branch Conflicts
on: [push, pull_request]

jobs:
  check-and-delete-conflicts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect and delete case-conflicting branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the current branch name
          CURRENT_BRANCH="${{ github.ref_name }}"
          
          echo "🔍 Checking branch: $CURRENT_BRANCH"
          
          # Get all branches from GitHub API (more reliable than git)
          ALL_BRANCHES=$(gh api repos/${{ github.repository }}/branches --jq '.[].name' | sort -u)
          
          echo "📋 All branches:"
          echo "$ALL_BRANCHES"
          
          # Check for case-insensitive conflicts
          CONFLICT_FOUND=false
          CONFLICTING_BRANCH=""
          
          while IFS= read -r existing_branch; do
            if [[ -z "$existing_branch" ]]; then
              continue
            fi
            
            # Compare case-insensitively
            if [[ "${CURRENT_BRANCH,,}" == "${existing_branch,,}" && "$CURRENT_BRANCH" != "$existing_branch" ]]; then
              echo ""
              echo "❌ CONFLICT DETECTED!"
              echo "   Branch '$CURRENT_BRANCH' conflicts with existing branch '$existing_branch'"
              CONFLICT_FOUND=true
              CONFLICTING_BRANCH="$existing_branch"
              break
            fi
          done <<< "$ALL_BRANCHES"
          
          if [[ "$CONFLICT_FOUND" == true ]]; then
            echo ""
            echo "🗑️  Deleting conflicting branch: $CURRENT_BRANCH"
            
            # Delete the branch via GitHub CLI (more reliable)
            gh api repos/${{ github.repository }}/git/refs/heads/$CURRENT_BRANCH -X DELETE \
              && echo "✅ Branch '$CURRENT_BRANCH' deleted successfully" \
              || echo "⚠️ Could not delete branch (may already be deleted or API issue)"
            
            echo ""
            echo "💡 Recommended: Use lowercase naming instead: '$CONFLICTING_BRANCH'"
            exit 1
          else
            echo ""
            echo "✅ Branch name is valid: $CURRENT_BRANCH"
            exit 0
          fi
