name: Prevent Case-Sensitive Branch Conflicts
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  
jobs:
  check-and-delete-conflicts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect and delete case-conflicting branches
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Get the current branch name
          CURRENT_BRANCH="${{ github.ref_name }}"
          
          echo "🔍 Checking branch: $CURRENT_BRANCH"
          
          # Get all branches from GitHub API
          ALL_BRANCHES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/branches" \
            | jq -r '.[].name' | sort -u)
          
          echo "📋 All branches:"
          echo "$ALL_BRANCHES"
          
          # Check for case-insensitive conflicts
          CONFLICT_FOUND=false
          CONFLICTING_BRANCH=""
          
          while IFS= read -r existing_branch; do
            if [[ -z "$existing_branch" ]]; then
              continue
            fi
            
            # Compare case-insensitively
            if [[ "${CURRENT_BRANCH,,}" == "${existing_branch,,}" && "$CURRENT_BRANCH" != "$existing_branch" ]]; then
              echo ""
              echo "❌ CONFLICT DETECTED!"
              echo "   Branch '$CURRENT_BRANCH' conflicts with existing branch '$existing_branch'"
              CONFLICT_FOUND=true
              CONFLICTING_BRANCH="$existing_branch"
              break
            fi
          done <<< "$ALL_BRANCHES"
          
          if [[ "$CONFLICT_FOUND" == true ]]; then
            echo ""
            echo "🗑️  Deleting conflicting branch: $CURRENT_BRANCH"
            
            # Delete the branch via GitHub API using curl with proper auth
            DELETE_RESPONSE=$(curl -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/$CURRENT_BRANCH" \
              -w "\n%{http_code}" 2>&1)
            
            HTTP_CODE=$(echo "$DELETE_RESPONSE" | tail -1)
            RESPONSE_BODY=$(echo "$DELETE_RESPONSE" | head -n-1)
            
            echo "Response code: $HTTP_CODE"
            
            if [[ "$HTTP_CODE" == "204" ]] || [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Branch '$CURRENT_BRANCH' deleted successfully"
            else
              echo "⚠️ Delete request returned: $HTTP_CODE"
              echo "$RESPONSE_BODY"
            fi
            
            echo ""
            echo "💡 Recommended: Use lowercase naming instead: '$CONFLICTING_BRANCH'"
            exit 0
          else
            echo ""
            echo "✅ Branch name is valid: $CURRENT_BRANCH"
            exit 0
          fi
