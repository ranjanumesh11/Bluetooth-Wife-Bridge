# =============================================================================
# Home Assistant Package — Sven & Son Platinum Adjustable Bed
# =============================================================================
# Drop this file into your HA `packages/` folder and add to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then restart Home Assistant. All 18 bed entities will appear automatically.
#
# Remote model: Richmat HJH89 (FCC ID: 2AJJGHJC0)
# Entity IDs follow the pattern:  switch.<device_name>_<button_name>
# e.g.  switch.sven_son_bed_bridge_head_up   (BLE approach)
#       switch.sven_son_bed_gpio_head_up      (GPIO approach)
# =============================================================================

# ---------------------------------------------------------------------------
# Input buttons — these appear as pressable "Button" cards in the HA dashboard.
# Each calls the underlying ESPHome switch momentarily.
# ---------------------------------------------------------------------------
input_button:

  # ── Head position ──────────────────────────────────────────────────────
  bed_head_up:
    name: "Head Up"
    icon: mdi:arrow-up-bold-box

  bed_head_down:
    name: "Head Down"
    icon: mdi:arrow-down-bold-box

  # ── Head Tilt (small pillow tilt, up to 7°) ────────────────────────────
  bed_head_tilt_up:
    name: "Head Tilt Up"
    icon: mdi:head-plus

  bed_head_tilt_down:
    name: "Head Tilt Down"
    icon: mdi:head-minus

  # ── Foot position ──────────────────────────────────────────────────────
  bed_foot_up:
    name: "Foot Up"
    icon: mdi:arrow-up-bold-box

  bed_foot_down:
    name: "Foot Down"
    icon: mdi:arrow-down-bold-box

  # ── Lumbar (up to 4") ──────────────────────────────────────────────────
  bed_lumbar_up:
    name: "Lumbar Up"
    icon: mdi:human

  bed_lumbar_down:
    name: "Lumbar Down"
    icon: mdi:human

  # ── Presets ────────────────────────────────────────────────────────────
  bed_preset_flat:
    name: "Preset: Flat"
    icon: mdi:bed-outline

  bed_preset_zerog:
    name: "Preset: Zero-G"
    icon: mdi:alpha-z-circle

  bed_preset_anti_snore:
    name: "Preset: Anti-Snore"
    icon: mdi:sleep-off

  bed_memory:
    name: "Memory Position"
    icon: mdi:content-save-outline

  # ── Massage ────────────────────────────────────────────────────────────
  bed_massage_onoff:
    name: "Massage ON/OFF"
    icon: mdi:power

  bed_massage_mode:
    name: "Massage Mode"
    icon: mdi:swap-horizontal-circle-outline

  bed_massage_head:
    name: "Massage: Head"
    icon: mdi:vibrate

  bed_massage_foot:
    name: "Massage: Foot"
    icon: mdi:vibrate

  # ── Accessories ────────────────────────────────────────────────────────
  bed_lights:
    name: "Under-Bed Light"
    icon: mdi:lightbulb-outline

  bed_flashlight:
    name: "Flashlight"
    icon: mdi:flashlight

# ---------------------------------------------------------------------------
# Input select — quick preset switcher (shows in HA dashboard as a dropdown)
# ---------------------------------------------------------------------------
input_select:
  bed_preset:
    name: "Bed Preset"
    options:
      - "Flat"
      - "Zero-G"
      - "Anti-Snore"
      - "Memory"
    initial: "Flat"
    icon: mdi:bed-outline

# ---------------------------------------------------------------------------
# Automations — wire input_button presses to ESPHome switch calls
# Change the entity_id prefix to match your ESPHome device name:
#   BLE approach : switch.sven_son_bed_bridge_*
#   GPIO approach: switch.sven_son_bed_gpio_*
# ---------------------------------------------------------------------------
automation:

  # ── Head ──────────────────────────────────────────────────────────────
  - id: bed_btn_head_up
    alias: "Bed Button: Head Up"
    trigger:
      platform: state
      entity_id: input_button.bed_head_up
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_head_up

  - id: bed_btn_head_down
    alias: "Bed Button: Head Down"
    trigger:
      platform: state
      entity_id: input_button.bed_head_down
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_head_down

  # ── Head Tilt ──────────────────────────────────────────────────────────
  - id: bed_btn_head_tilt_up
    alias: "Bed Button: Head Tilt Up"
    trigger:
      platform: state
      entity_id: input_button.bed_head_tilt_up
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_head_tilt_up

  - id: bed_btn_head_tilt_down
    alias: "Bed Button: Head Tilt Down"
    trigger:
      platform: state
      entity_id: input_button.bed_head_tilt_down
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_head_tilt_down

  # ── Foot ──────────────────────────────────────────────────────────────
  - id: bed_btn_foot_up
    alias: "Bed Button: Foot Up"
    trigger:
      platform: state
      entity_id: input_button.bed_foot_up
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_foot_up

  - id: bed_btn_foot_down
    alias: "Bed Button: Foot Down"
    trigger:
      platform: state
      entity_id: input_button.bed_foot_down
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_foot_down

  # ── Lumbar ────────────────────────────────────────────────────────────
  - id: bed_btn_lumbar_up
    alias: "Bed Button: Lumbar Up"
    trigger:
      platform: state
      entity_id: input_button.bed_lumbar_up
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_lumbar_up

  - id: bed_btn_lumbar_down
    alias: "Bed Button: Lumbar Down"
    trigger:
      platform: state
      entity_id: input_button.bed_lumbar_down
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_lumbar_down

  # ── Presets ───────────────────────────────────────────────────────────
  - id: bed_btn_preset_flat
    alias: "Bed Button: Preset Flat"
    trigger:
      platform: state
      entity_id: input_button.bed_preset_flat
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_preset_flat

  - id: bed_btn_preset_zerog
    alias: "Bed Button: Preset Zero-G"
    trigger:
      platform: state
      entity_id: input_button.bed_preset_zerog
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_preset_zero_g

  - id: bed_btn_anti_snore
    alias: "Bed Button: Anti-Snore"
    trigger:
      platform: state
      entity_id: input_button.bed_preset_anti_snore
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_preset_anti_snore

  - id: bed_btn_memory
    alias: "Bed Button: Memory"
    trigger:
      platform: state
      entity_id: input_button.bed_memory
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_memory_position

  # ── Preset select dropdown ────────────────────────────────────────────
  - id: bed_preset_select
    alias: "Bed: Preset Dropdown"
    trigger:
      platform: state
      entity_id: input_select.bed_preset
    action:
      choose:
        - conditions:
            condition: state
            entity_id: input_select.bed_preset
            state: "Flat"
          sequence:
            service: switch.turn_on
            target:
              entity_id: switch.sven_son_bed_bridge_preset_flat
        - conditions:
            condition: state
            entity_id: input_select.bed_preset
            state: "Zero-G"
          sequence:
            service: switch.turn_on
            target:
              entity_id: switch.sven_son_bed_bridge_preset_zero_g
        - conditions:
            condition: state
            entity_id: input_select.bed_preset
            state: "Anti-Snore"
          sequence:
            service: switch.turn_on
            target:
              entity_id: switch.sven_son_bed_bridge_preset_anti_snore
        - conditions:
            condition: state
            entity_id: input_select.bed_preset
            state: "Memory"
          sequence:
            service: switch.turn_on
            target:
              entity_id: switch.sven_son_bed_bridge_memory_position

  # ── Massage ───────────────────────────────────────────────────────────
  - id: bed_btn_massage_onoff
    alias: "Bed Button: Massage ON/OFF"
    trigger:
      platform: state
      entity_id: input_button.bed_massage_onoff
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_massage_on_off

  - id: bed_btn_massage_mode
    alias: "Bed Button: Massage Mode"
    trigger:
      platform: state
      entity_id: input_button.bed_massage_mode
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_massage_mode

  - id: bed_btn_massage_head
    alias: "Bed Button: Massage Head"
    trigger:
      platform: state
      entity_id: input_button.bed_massage_head
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_massage_head

  - id: bed_btn_massage_foot
    alias: "Bed Button: Massage Foot"
    trigger:
      platform: state
      entity_id: input_button.bed_massage_foot
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_massage_foot

  # ── Accessories ───────────────────────────────────────────────────────
  - id: bed_btn_lights
    alias: "Bed Button: Under-Bed Light"
    trigger:
      platform: state
      entity_id: input_button.bed_lights
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_under_bed_light

  - id: bed_btn_flashlight
    alias: "Bed Button: Flashlight"
    trigger:
      platform: state
      entity_id: input_button.bed_flashlight
    action:
      service: switch.turn_on
      target:
        entity_id: switch.sven_son_bed_bridge_flashlight
